name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: nvmd-linux-x86_64
            binary: nvmd
          - os: macos-13
            asset: nvmd-macos-x86_64
            binary: nvmd
          - os: macos-14
            asset: nvmd-macos-aarch64
            binary: nvmd
          - os: windows-latest
            asset: nvmd-windows-x86_64
            binary: nvmd.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.asset }}"
          cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}/"
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C "dist/${{ matrix.asset }}" "${{ matrix.binary }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
